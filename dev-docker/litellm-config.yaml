# =============================================================================
# LiteLLM Proxy Configuration
# - Llama Guard 4 guardrail for prompt injection detection (pre-call)
# - Complexity-based routing across 4 tiers: SIMPLE, MEDIUM, COMPLEX, REASONING
# =============================================================================

# ---------------------------------------------------------------------------
# Model List
# ---------------------------------------------------------------------------
# Define the target models for each complexity tier, plus the complexity
# router itself and the Llama Guard safety model.

model_list:

  # --- Tier models (routed to by the complexity router) --------------------
  
  - model_name: gpt-4o-mini                       # SIMPLE tier
    litellm_params:
      model: openrouter/openai/gpt-4o-mini
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: gpt-4o                            # MEDIUM tier
    litellm_params:
      model: openrouter/openai/gpt-4o
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: claude-sonnet                      # COMPLEX tier
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4.6
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: claude-opus                         # REASONING tier
    litellm_params:
      model: openrouter/anthropic/claude-opus-4.7
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # --- Llama Guard model (used by the guardrail, not routed to directly) ---

  - model_name: llama-guard
    litellm_params:
      model: openrouter/meta-llama/llama-guard-4-12b
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1/chat/completions

  # --- Complexity router (public-facing model name) ------------------------

  - model_name: smart-router
    litellm_params:
      model: auto_router/complexity_router

      complexity_router_config:
        # Map each complexity tier to one of the model_name entries above
        tiers:
          SIMPLE:    gpt-4o-mini
          MEDIUM:    gpt-4o
          COMPLEX:   claude-sonnet
          REASONING: claude-opus

        # Normalized-score boundaries between tiers
        tier_boundaries:
          simple_medium:     0.15   # score < 0.15  → SIMPLE
          medium_complex:    0.35   # 0.15 – 0.35   → MEDIUM
          complex_reasoning: 0.60   # 0.35 – 0.60   → COMPLEX
                                    # score > 0.60  → REASONING

        # Token-count thresholds that influence the complexity score
        token_thresholds:
          simple:  15              # prompts shorter than this skew SIMPLE
          complex: 400             # prompts longer  than this skew COMPLEX

        # Weight each scoring dimension (should sum to ~1.0)
        dimension_weights:
          tokenCount:         0.10
          codePresence:       0.30
          reasoningMarkers:   0.25
          technicalTerms:     0.25
          simpleIndicators:   0.05
          multiStepPatterns:  0.03
          questionComplexity: 0.02

      # Fallback if the router cannot determine a tier
      complexity_router_default_model: gpt-4o

# ---------------------------------------------------------------------------
# Guardrails
# ---------------------------------------------------------------------------
# Use a custom-code guardrail that calls the Llama Guard 4 12B model
# before every LLM request to scan for prompt injection attacks.

guardrails:
  - guardrail_name: llama-guard-4-pre
    litellm_params:
      guardrail: llama_guard_4
      mode: pre_call
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1
      default_on: true

# ---------------------------------------------------------------------------
# Guardrail Policies  (optional — apply the guard globally)
# ---------------------------------------------------------------------------
policies:
  safety-baseline:
    guardrails:
      add:
        - llama-guard-4-pre

policy_attachments:
  - policy: safety-baseline
    scope: "*"                                     # every request

# ---------------------------------------------------------------------------
# Router Settings
# ---------------------------------------------------------------------------
router_settings:
  routing_strategy: simple-shuffle                 # load-balance within a tier
  disable_cooldowns: True
  #num_retries: 3
  #timeout: 120                                     # seconds
  #allowed_fails: 3                                 # cooldown after N failures
  #cooldown_time: 60                                # seconds before retry
  
  # Cross-tier fallbacks if the primary tier model is unavailable 
  fallbacks:
    - gpt-4o-mini: [gpt-4o]
    - claude-sonnet: [gpt-4o]
    - claude-opus: [claude-sonnet]


# ---------------------------------------------------------------------------
# General Settings
# ---------------------------------------------------------------------------
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # database_url: os.environ/DATABASE_URL          # uncomment for persistent keys/spend tracking
